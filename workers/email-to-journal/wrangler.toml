name = "email-to-journal"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# R2 bucket binding — must match a bucket you've created in Cloudflare
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "xispo-journal-images"

# Plain config vars (non-secret) — update before deploying
[vars]
GITHUB_REPO   = "xispolson/xispo-co"
GITHUB_BRANCH = "main"
R2_PUBLIC_URL = "https://pub-dd22c33c1e3247f8ba1cf2bac1843004.r2.dev"  # your R2 bucket public URL
ALLOWED_SENDER = "xispolson@gmail.com"            # your email address
ALLOWED_PHONE  = "+15550000000"                 # your phone in E.164 (for SMS stub)

# Secrets — set these via: wrangler secret put <NAME>
# GITHUB_TOKEN       PAT with Contents: read+write on the repo
# TWILIO_AUTH_TOKEN  Twilio webhook auth token (for SMS stub, when implemented)
